name: example
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.16.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  mini_music_visualizer:
    path: ../
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  screenshot: ^3.0.0      # 화면을 이미지로 캡처하는 도구
  share_plus: ^10.1.0     # 이미지를 인스타나 카톡으로 공유하는 도구
  path_provider: ^2.1.3   # 이미지를 임시 저장할 공간
  google_fonts: ^6.2.1    # 감성적인 손글씨 폰트

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  flutter_launcher_icons: ^0.13.1 # 👈 앱 아이콘을 자동으로 만들어주는 패키지 추가!

# 🚀 앱 아이콘 설정 (여기서 어떤 이미지를 아이콘으로 쓸지 정합니다)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/yeo_un_icon.png" # 진우님이 저장할 아이콘 이미지 이름

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env